services:
  postgres:
    image: postgres:13
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: employee_db
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d

  spark:
    image: jupyter/pyspark-notebook:latest
    container_name: spark_app
    ports:
      - "8888:8888"
    volumes:
      - ./:/home/jovyan/work